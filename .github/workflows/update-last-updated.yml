name: Update last updated timestamp

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-timestamp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create last-updated file
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > last-updated.txt

      - name: Commit timestamp
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last updated timestamp"
          file_pattern: last-updated.txt
